name: Build Door Memo APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create Flutter project
        run: |
          rm -rf door_memo_app
          flutter create door_memo_app --platforms android --org com.nayeem --project-name door_memo_reminder

      - name: Write pubspec.yaml
        working-directory: door_memo_app
        run: |
          cat > pubspec.yaml <<'EOF'
          name: door_memo_reminder
          description: Offline Door Memo Reminder App
          publish_to: "none"
          version: 1.0.0+1

          environment:
            sdk: ">=3.4.0 <4.0.0"

          dependencies:
            flutter:
              sdk: flutter
            shared_preferences: ^2.3.2
            intl: ^0.19.0

          dev_dependencies:
            flutter_test:
              sdk: flutter
            flutter_lints: ^4.0.0

          flutter:
            uses-material-design: true
          EOF

      - name: Write app code
        working-directory: door_memo_app
        run: |
          cat > lib/main.dart <<'EOF'
          import 'dart:convert';
          import 'package:flutter/material.dart';
          import 'package:shared_preferences/shared_preferences.dart';
          import 'package:intl/intl.dart';

          void main() {
            runApp(const DoorMemoApp());
          }

          class DoorMemoApp extends StatelessWidget {
            const DoorMemoApp({super.key});

            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                title: 'Door Memo Reminder',
                debugShowCheckedModeBanner: false,
                theme: ThemeData(
                  useMaterial3: true,
                  colorSchemeSeed: Colors.indigo,
                  scaffoldBackgroundColor: const Color(0xfff4f6fb),
                  inputDecorationTheme: const InputDecorationTheme(
                    border: OutlineInputBorder(),
                  ),
                ),
                home: const HomePage(),
              );
            }
          }

          class Memo {
            String id;
            String memoNo;
            String name;
            String phone;
            String address;
            String details;
            String orderDate;
            String seenDate;
            String deliveryDate;
            double total;
            double advance;
            double due;
            bool delivered;
            bool paid;

            Memo({
              required this.id,
              required this.memoNo,
              required this.name,
              required this.phone,
              required this.address,
              required this.details,
              required this.orderDate,
              required this.seenDate,
              required this.deliveryDate,
              required this.total,
              required this.advance,
              required this.due,
              required this.delivered,
              required this.paid,
            });

            Map<String, dynamic> toJson() => {
              'id': id,
              'memoNo': memoNo,
              'name': name,
              'phone': phone,
              'address': address,
              'details': details,
              'orderDate': orderDate,
              'seenDate': seenDate,
              'deliveryDate': deliveryDate,
              'total': total,
              'advance': advance,
              'due': due,
              'delivered': delivered,
              'paid': paid,
            };

            factory Memo.fromJson(Map<String, dynamic> json) => Memo(
              id: json['id'] ?? '',
              memoNo: json['memoNo'] ?? '',
              name: json['name'] ?? '',
              phone: json['phone'] ?? '',
              address: json['address'] ?? '',
              details: json['details'] ?? '',
              orderDate: json['orderDate'] ?? '',
              seenDate: json['seenDate'] ?? '',
              deliveryDate: json['deliveryDate'] ?? '',
              total: (json['total'] ?? 0).toDouble(),
              advance: (json['advance'] ?? 0).toDouble(),
              due: (json['due'] ?? 0).toDouble(),
              delivered: json['delivered'] ?? false,
              paid: json['paid'] ?? false,
            );
          }

          class MemoStore {
            static const key = 'memos';

            static Future<List<Memo>> getAll() async {
              final pref = await SharedPreferences.getInstance();
              final raw = pref.getStringList(key) ?? [];
              return raw.map((e) => Memo.fromJson(jsonDecode(e))).toList();
            }

            static Future<void> save(Memo memo) async {
              final list = await getAll();
              final index = list.indexWhere((m) => m.id == memo.id);
              if (index >= 0) {
                list[index] = memo;
              } else {
                list.add(memo);
              }
              final pref = await SharedPreferences.getInstance();
              await pref.setStringList(
                key,
                list.map((m) => jsonEncode(m.toJson())).toList(),
              );
            }

            static Future<void> delete(String id) async {
              final list = await getAll();
              list.removeWhere((m) => m.id == id);
              final pref = await SharedPreferences.getInstance();
              await pref.setStringList(
                key,
                list.map((m) => jsonEncode(m.toJson())).toList(),
              );
            }
          }

          class HomePage extends StatefulWidget {
            const HomePage({super.key});

            @override
            State<HomePage> createState() => _HomePageState();
          }

          class _HomePageState extends State<HomePage> {
            List<Memo> memos = [];

            @override
            void initState() {
              super.initState();
              load();
            }

            Future<void> load() async {
              memos = await MemoStore.getAll();
              setState(() {});
            }

            @override
            Widget build(BuildContext context) {
              final pending = memos.where((m) => !m.delivered).length;
              final delivered = memos.where((m) => m.delivered).length;
              final dueOrders = memos.where((m) => !m.paid && m.due > 0).length;
              final paidOrders = memos.where((m) => m.paid || m.due <= 0).length;
              final totalSale = memos.fold<double>(0, (p, m) => p + m.total);
              final totalDue = memos.fold<double>(0, (p, m) => p + (m.paid ? 0 : m.due));

              return Scaffold(
                appBar: AppBar(title: const Text('Door Memo Reminder'), centerTitle: true),
                body: RefreshIndicator(
                  onRefresh: load,
                  child: ListView(
                    padding: const EdgeInsets.all(14),
                    children: [
                      const Text('Dashboard', style: TextStyle(fontSize: 26, fontWeight: FontWeight.bold)),
                      const SizedBox(height: 12),
                      GridView.count(
                        crossAxisCount: 2,
                        shrinkWrap: true,
                        physics: const NeverScrollableScrollPhysics(),
                        crossAxisSpacing: 10,
                        mainAxisSpacing: 10,
                        childAspectRatio: 1.25,
                        children: [
                          card('Total Orders', memos.length.toString(), Icons.receipt_long),
                          card('Pending', pending.toString(), Icons.pending_actions),
                          card('Delivered', delivered.toString(), Icons.check_circle),
                          card('Due Orders', dueOrders.toString(), Icons.money_off),
                          card('Paid Orders', paidOrders.toString(), Icons.payments),
                          card('Total Due', totalDue.toStringAsFixed(0), Icons.warning),
                        ],
                      ),
                      const SizedBox(height: 12),
                      Card(
                        elevation: 0,
                        child: ListTile(
                          leading: const Icon(Icons.trending_up),
                          title: const Text('Total Sale'),
                          trailing: Text(totalSale.toStringAsFixed(0), style: const TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                        ),
                      ),
                      const SizedBox(height: 12),
                      ElevatedButton.icon(
                        icon: const Icon(Icons.add),
                        label: const Text('Add Memo'),
                        onPressed: () async {
                          await Navigator.push(context, MaterialPageRoute(builder: (_) => const AddMemoPage()));
                          load();
                        },
                      ),
                      OutlinedButton.icon(
                        icon: const Icon(Icons.list),
                        label: const Text('All Orders'),
                        onPressed: () async {
                          await Navigator.push(context, MaterialPageRoute(builder: (_) => const OrdersPage()));
                          load();
                        },
                      ),
                      const SizedBox(height: 10),
                      const Text(
                        'Note: This starter version saves data offline. Alarm feature can be added in next version after APK test.',
                        textAlign: TextAlign.center,
                      ),
                    ],
                  ),
                ),
              );
            }

            Widget card(String title, String value, IconData icon) {
              return Card(
                elevation: 0,
                child: Padding(
                  padding: const EdgeInsets.all(14),
                  child: Column(
                    crossAxisAlignment: CrossAxisAlignment.start,
                    children: [
                      Icon(icon),
                      const Spacer(),
                      Text(value, style: const TextStyle(fontSize: 23, fontWeight: FontWeight.bold)),
                      Text(title),
                    ],
                  ),
                ),
              );
            }
          }

          class AddMemoPage extends StatefulWidget {
            final Memo? memo;
            const AddMemoPage({super.key, this.memo});

            @override
            State<AddMemoPage> createState() => _AddMemoPageState();
          }

          class _AddMemoPageState extends State<AddMemoPage> {
            final formKey = GlobalKey<FormState>();
            final memoNo = TextEditingController();
            final name = TextEditingController();
            final phone = TextEditingController();
            final address = TextEditingController();
            final details = TextEditingController();
            final total = TextEditingController(text: '0');
            final advance = TextEditingController(text: '0');

            String orderDate = DateFormat('yyyy-MM-dd').format(DateTime.now());
            String seenDate = '';
            String deliveryDate = '';
            bool delivered = false;
            bool paid = false;

            @override
            void initState() {
              super.initState();
              final m = widget.memo;
              if (m != null) {
                memoNo.text = m.memoNo;
                name.text = m.name;
                phone.text = m.phone;
                address.text = m.address;
                details.text = m.details;
                total.text = m.total.toStringAsFixed(0);
                advance.text = m.advance.toStringAsFixed(0);
                orderDate = m.orderDate;
                seenDate = m.seenDate;
                deliveryDate = m.deliveryDate;
                delivered = m.delivered;
                paid = m.paid;
              }
            }

            double get totalAmount => double.tryParse(total.text) ?? 0;
            double get advanceAmount => double.tryParse(advance.text) ?? 0;
            double get dueAmount {
              final due = totalAmount - advanceAmount;
              return due < 0 ? 0 : due;
            }

            Future<void> pickDate(String type) async {
              final picked = await showDatePicker(
                context: context,
                firstDate: DateTime(2024),
                lastDate: DateTime(2035),
                initialDate: DateTime.now(),
              );
              if (picked != null) {
                setState(() {
                  final value = DateFormat('yyyy-MM-dd').format(picked);
                  if (type == 'seen') {
                    seenDate = value;
                  } else {
                    deliveryDate = value;
                  }
                });
              }
            }

            Future<void> save() async {
              if (!formKey.currentState!.validate()) return;

              final memo = Memo(
                id: widget.memo?.id ?? DateTime.now().millisecondsSinceEpoch.toString(),
                memoNo: memoNo.text.trim(),
                name: name.text.trim(),
                phone: phone.text.trim(),
                address: address.text.trim(),
                details: details.text.trim(),
                orderDate: orderDate,
                seenDate: seenDate,
                deliveryDate: deliveryDate,
                total: totalAmount,
                advance: advanceAmount,
                due: dueAmount,
                delivered: delivered,
                paid: paid || dueAmount <= 0,
              );

              await MemoStore.save(memo);
              if (mounted) Navigator.pop(context);
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(title: Text(widget.memo == null ? 'Add Memo' : 'Edit Memo')),
                body: Form(
                  key: formKey,
                  child: ListView(
                    padding: const EdgeInsets.all(14),
                    children: [
                      field(memoNo, 'Memo No', required: true),
                      field(name, 'Customer Name', required: true),
                      field(phone, 'Phone Number'),
                      field(address, 'Address'),
                      field(details, 'Product / Particular Description', maxLines: 3),
                      field(total, 'Total Amount', number: true),
                      field(advance, 'Advance Amount', number: true),
                      Card(
                        elevation: 0,
                        child: ListTile(
                          title: const Text('Due Amount'),
                          trailing: Text(dueAmount.toStringAsFixed(0), style: const TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                        ),
                      ),
                      dateTile('Seen Date', seenDate, () => pickDate('seen')),
                      dateTile('Delivery Date', deliveryDate, () => pickDate('delivery')),
                      SwitchListTile(
                        title: const Text('Delivered'),
                        value: delivered,
                        onChanged: (v) => setState(() => delivered = v),
                      ),
                      SwitchListTile(
                        title: const Text('Payment Paid'),
                        value: paid || dueAmount <= 0,
                        onChanged: dueAmount <= 0 ? null : (v) => setState(() => paid = v),
                      ),
                      const SizedBox(height: 12),
                      ElevatedButton.icon(
                        icon: const Icon(Icons.save),
                        label: const Text('Save Memo'),
                        onPressed: save,
                      ),
                    ],
                  ),
                ),
              );
            }

            Widget field(TextEditingController controller, String label, {bool required = false, bool number = false, int maxLines = 1}) {
              return Padding(
                padding: const EdgeInsets.only(bottom: 10),
                child: TextFormField(
                  controller: controller,
                  maxLines: maxLines,
                  keyboardType: number ? TextInputType.number : null,
                  onChanged: (_) => setState(() {}),
                  validator: required ? (v) => v == null || v.trim().isEmpty ? 'Required' : null : null,
                  decoration: InputDecoration(labelText: label),
                ),
              );
            }

            Widget dateTile(String title, String value, VoidCallback onTap) {
              return Card(
                elevation: 0,
                child: ListTile(
                  title: Text(title),
                  subtitle: Text(value.isEmpty ? 'Not selected' : value),
                  trailing: const Icon(Icons.calendar_month),
                  onTap: onTap,
                ),
              );
            }
          }

          class OrdersPage extends StatefulWidget {
            const OrdersPage({super.key});

            @override
            State<OrdersPage> createState() => _OrdersPageState();
          }

          class _OrdersPageState extends State<OrdersPage> {
            List<Memo> memos = [];
            String query = '';
            String filter = 'All';

            @override
            void initState() {
              super.initState();
              load();
            }

            Future<void> load() async {
              memos = await MemoStore.getAll();
              setState(() {});
            }

            List<Memo> get filtered {
              var list = memos.where((m) {
                final q = query.toLowerCase();
                return m.memoNo.toLowerCase().contains(q) ||
                    m.name.toLowerCase().contains(q) ||
                    m.phone.toLowerCase().contains(q);
              }).toList();

              if (filter == 'Pending') list = list.where((m) => !m.delivered).toList();
              if (filter == 'Delivered') list = list.where((m) => m.delivered).toList();
              if (filter == 'Due') list = list.where((m) => !m.paid && m.due > 0).toList();
              if (filter == 'Paid') list = list.where((m) => m.paid || m.due <= 0).toList();

              return list;
            }

            @override
            Widget build(BuildContext context) {
              final list = filtered;
              return Scaffold(
                appBar: AppBar(title: const Text('All Orders')),
                floatingActionButton: FloatingActionButton(
                  child: const Icon(Icons.add),
                  onPressed: () async {
                    await Navigator.push(context, MaterialPageRoute(builder: (_) => const AddMemoPage()));
                    load();
                  },
                ),
                body: Column(
                  children: [
                    Padding(
                      padding: const EdgeInsets.all(12),
                      child: TextField(
                        decoration: const InputDecoration(hintText: 'Search memo, name, phone', prefixIcon: Icon(Icons.search)),
                        onChanged: (v) => setState(() => query = v),
                      ),
                    ),
                    SizedBox(
                      height: 42,
                      child: ListView(
                        scrollDirection: Axis.horizontal,
                        padding: const EdgeInsets.symmetric(horizontal: 12),
                        children: ['All', 'Pending', 'Delivered', 'Due', 'Paid'].map((f) {
                          return Padding(
                            padding: const EdgeInsets.only(right: 8),
                            child: ChoiceChip(
                              label: Text(f),
                              selected: filter == f,
                              onSelected: (_) => setState(() => filter = f),
                            ),
                          );
                        }).toList(),
                      ),
                    ),
                    Expanded(
                      child: list.isEmpty
                          ? const Center(child: Text('No memo found'))
                          : ListView.builder(
                              padding: const EdgeInsets.all(12),
                              itemCount: list.length,
                              itemBuilder: (context, index) {
                                final m = list[index];
                                return Card(
                                  elevation: 0,
                                  child: ListTile(
                                    title: Text('Memo ${m.memoNo} - ${m.name}', style: const TextStyle(fontWeight: FontWeight.bold)),
                                    subtitle: Text('Phone: ${m.phone}\nSeen: ${m.seenDate}\nDelivery: ${m.deliveryDate}\nDue: ${m.due.toStringAsFixed(0)}'),
                                    isThreeLine: true,
                                    onTap: () async {
                                      await Navigator.push(context, MaterialPageRoute(builder: (_) => DetailsPage(memo: m)));
                                      load();
                                    },
                                  ),
                                );
                              },
                            ),
                    ),
                  ],
                ),
              );
            }
          }

          class DetailsPage extends StatefulWidget {
            final Memo memo;
            const DetailsPage({super.key, required this.memo});

            @override
            State<DetailsPage> createState() => _DetailsPageState();
          }

          class _DetailsPageState extends State<DetailsPage> {
            late Memo memo;

            @override
            void initState() {
              super.initState();
              memo = widget.memo;
            }

            Future<void> update() async {
              await MemoStore.save(memo);
              setState(() {});
            }

            @override
            Widget build(BuildContext context) {
              return Scaffold(
                appBar: AppBar(
                  title: Text('Memo ${memo.memoNo}'),
                  actions: [
                    IconButton(
                      icon: const Icon(Icons.edit),
                      onPressed: () async {
                        await Navigator.push(context, MaterialPageRoute(builder: (_) => AddMemoPage(memo: memo)));
                        if (mounted) Navigator.pop(context);
                      },
                    ),
                    IconButton(
                      icon: const Icon(Icons.delete),
                      onPressed: () async {
                        await MemoStore.delete(memo.id);
                        if (mounted) Navigator.pop(context);
                      },
                    ),
                  ],
                ),
                body: ListView(
                  padding: const EdgeInsets.all(14),
                  children: [
                    Card(
                      elevation: 0,
                      child: Padding(
                        padding: const EdgeInsets.all(16),
                        child: Column(
                          children: [
                            const Text('M/S. Chittagong Door', style: TextStyle(fontSize: 22, fontWeight: FontWeight.bold)),
                            const Text('Digital Memo'),
                            const Divider(),
                            row('Memo No', memo.memoNo),
                            row('Date', memo.orderDate),
                            row('Customer', memo.name),
                            row('Phone', memo.phone),
                            row('Address', memo.address),
                            const Divider(),
                            row('Details', memo.details),
                            row('Total', memo.total.toStringAsFixed(0)),
                            row('Advance', memo.advance.toStringAsFixed(0)),
                            row('Due', memo.due.toStringAsFixed(0)),
                            const Divider(),
                            row('Seen Date', memo.seenDate),
                            row('Delivery Date', memo.deliveryDate),
                            row('Order Status', memo.delivered ? 'Delivered' : 'Pending'),
                            row('Payment Status', (memo.paid || memo.due <= 0) ? 'Paid' : 'Due'),
                          ],
                        ),
                      ),
                    ),
                    ElevatedButton.icon(
                      icon: const Icon(Icons.check_circle),
                      label: Text(memo.delivered ? 'Mark Pending' : 'Mark Delivered'),
                      onPressed: () async {
                        memo.delivered = !memo.delivered;
                        await update();
                      },
                    ),
                    OutlinedButton.icon(
                      icon: const Icon(Icons.payments),
                      label: Text(memo.paid ? 'Mark Due' : 'Mark Paid'),
                      onPressed: () async {
                        memo.paid = !memo.paid;
                        await update();
                      },
                    ),
                  ],
                ),
              );
            }

            Widget row(String left, String right) {
              return Padding(
                padding: const EdgeInsets.symmetric(vertical: 5),
                child: Row(
                  crossAxisAlignment: CrossAxisAlignment.start,
                  children: [
                    SizedBox(width: 120, child: Text(left, style: const TextStyle(fontWeight: FontWeight.bold))),
                    Expanded(child: Text(right.isEmpty ? '-' : right)),
                  ],
                ),
              );
            }
          }
          EOF

      - name: Set Android SDK
        working-directory: door_memo_app
        run: |
          python3 - <<'PY'
          from pathlib import Path
          for file in ["android/app/build.gradle", "android/app/build.gradle.kts"]:
              p = Path(file)
              if p.exists():
                  s = p.read_text()
                  s = s.replace("compileSdk = flutter.compileSdkVersion", "compileSdk = 35")
                  s = s.replace("minSdk = flutter.minSdkVersion", "minSdk = 23")
                  s = s.replace("targetSdk = flutter.targetSdkVersion", "targetSdk = 35")
                  s = s.replace("compileSdk flutter.compileSdkVersion", "compileSdk 35")
                  s = s.replace("minSdkVersion flutter.minSdkVersion", "minSdkVersion 23")
                  s = s.replace("targetSdkVersion flutter.targetSdkVersion", "targetSdkVersion 35")
                  p.write_text(s)
          PY

      - name: Build release APK
        working-directory: door_memo_app
        run: flutter build apk --release

      - name: Find APK
        run: |
          echo "APK files:"
          find door_memo_app -name "*.apk" -type f
          ls -lah door_memo_app/build/app/outputs/flutter-apk/

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: door-memo-reminder-apk
          path: door_memo_app/build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
